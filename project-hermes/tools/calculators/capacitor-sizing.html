<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Capacitor Sizing · HVAC Calculators</title>
<link rel="stylesheet" href="../../base.css">
<link rel="stylesheet" href="calc.css">
<style>
</style>
</head>
<body>
<header>
  <a class="hdr-home" href="../../index.html" title="Project home">⌂</a>
  <a class="hdr-back" href="javascript:void(0)" onclick="history.back()" title="Back">&#8592;</a>
  <div class="hdr-titles">
    <div class="hdr-title">Capacitor Sizing</div>
    <div class="hdr-sub"><span class="hdr-tier t2">field</span>PSC Motor Run Capacitor</div>
  </div>
  <button class="hdr-fav" id="favBtn" title="Favorite" onclick="toggleFav()">&#9734;</button>
</header>
<main>
  <div class="sec sec-flush">
    <div class="sec-lbl sec-lbl-flush">Motor Data</div>
    <div class="input-pair">
      <div class="fg">
        <label class="fl">Motor Rated Voltage</label>
        <div class="iw">
          <input type="number" id="inVolts" inputmode="decimal" placeholder="—">
          <span class="iw-unit">V</span>
        </div>
      </div>
      <div class="fg">
        <label class="fl">Motor FLA</label>
        <div class="iw">
          <input type="number" id="inAmps" inputmode="decimal" placeholder="—">
          <span class="iw-unit">A</span>
        </div>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Capacitor Voltage Rating (optional)</label>
      <div class="iw">
        <input type="number" id="inCapVolts" inputmode="decimal" placeholder="same as motor">
        <span class="iw-unit">V</span>
      </div>
    </div>
  </div>

  <div class="results">
    <div class="result-row dim" id="rowCalc">
      <div class="rr-left">
        <div class="rr-label">Calculated MFD</div>
        <div class="rr-sub">MFD = (Amps × 2652) / Volts</div>
      </div>
      <div class="rr-val" id="valCalc">— MFD</div>
    </div>
    <div class="result-row dim" id="rowStd">
      <div class="rr-left">
        <div class="rr-label">Nearest Standard</div>
        <div class="rr-sub" id="subTolerance">±6% tolerance range</div>
      </div>
      <div class="rr-val" id="valStd">— MFD</div>
    </div>
    <div class="result-row dim" id="rowCapV">
      <div class="rr-left">
        <div class="rr-label">Voltage Rating</div>
        <div class="rr-sub" id="subCapV">Must meet or exceed motor voltage</div>
      </div>
      <div class="rr-val" id="valCapV">—</div>
    </div>
  </div>

  <div class="hint">Approximation for PSC motors. Always verify against manufacturer specs.</div>
</main>
<script>
'use strict';
function init() {
  var inVolts = document.getElementById('inVolts');
  var inAmps = document.getElementById('inAmps');
  var inCapVolts = document.getElementById('inCapVolts');

  var stdMFD = [3, 4, 5, 7.5, 10, 12.5, 15, 17.5, 20, 25, 30, 35, 40, 45, 50, 55, 60, 70, 80];

  function nearestStd(mfd) {
    var best = stdMFD[0];
    var bestDiff = Math.abs(mfd - best);
    for (var i = 1; i < stdMFD.length; i++) {
      var diff = Math.abs(mfd - stdMFD[i]);
      if (diff < bestDiff) { best = stdMFD[i]; bestDiff = diff; }
    }
    return best;
  }

  function calc() {
    var volts = parseFloat(inVolts.value);
    var amps = parseFloat(inAmps.value);
    var capVolts = parseFloat(inCapVolts.value);

    if (!volts || volts <= 0 || !amps || amps <= 0) {
      document.getElementById('rowCalc').className = 'result-row dim';
      document.getElementById('rowStd').className = 'result-row dim';
      document.getElementById('rowCapV').className = 'result-row dim';
      document.getElementById('valCalc').className = 'rr-val';
      document.getElementById('valStd').className = 'rr-val';
      document.getElementById('valCapV').className = 'rr-val';
      document.getElementById('valCalc').textContent = '— MFD';
      document.getElementById('valStd').textContent = '— MFD';
      document.getElementById('valCapV').textContent = '—';
      document.getElementById('subTolerance').textContent = '±6% tolerance range';
      document.getElementById('subCapV').textContent = 'Must meet or exceed motor voltage';
      return;
    }

    var mfd = (amps * 2652) / volts;
    var std = nearestStd(mfd);
    var lo = (std * 0.94).toFixed(1);
    var hi = (std * 1.06).toFixed(1);

    document.getElementById('valCalc').textContent = mfd.toFixed(1) + ' MFD';
    document.getElementById('valStd').textContent = std + ' MFD';
    document.getElementById('subTolerance').textContent = '±6% range: ' + lo + ' – ' + hi + ' MFD';

    document.getElementById('rowCalc').className = 'result-row live';
    document.getElementById('rowStd').className = 'result-row live';
    document.getElementById('valCalc').className = 'rr-val live';
    document.getElementById('valStd').className = 'rr-val live';

    /* Cap voltage rating check */
    var minCapV = volts >= 208 ? 370 : 250;
    if (capVolts && capVolts > 0) {
      var pass = capVolts >= minCapV;
      document.getElementById('rowCapV').className = 'result-row ' + (pass ? 'ok' : 'high');
      document.getElementById('valCapV').className = 'rr-val ' + (pass ? 'ok' : 'high');
      document.getElementById('valCapV').textContent = capVolts + ' VAC';
      document.getElementById('subCapV').textContent = pass ? 'Meets minimum ' + minCapV + ' VAC' : 'Below minimum ' + minCapV + ' VAC for ' + volts + 'V motor';
    } else {
      document.getElementById('rowCapV').className = 'result-row live';
      document.getElementById('valCapV').className = 'rr-val live';
      document.getElementById('valCapV').textContent = 'Min ' + minCapV + ' VAC';
      document.getElementById('subCapV').textContent = 'Enter cap voltage to verify';
    }
  }

  inVolts.addEventListener('input', calc);
  inAmps.addEventListener('input', calc);
  inCapVolts.addEventListener('input', calc);
}
document.addEventListener('DOMContentLoaded', init);

// Favorites
(function(){
  var KEY='hermes_favorites';
  var id=location.pathname.split('/').pop().replace('.html','');
  var title=document.title.split('·')[0].trim();
  var tierEl=document.querySelector('.hdr-tier');
  var tier=tierEl?(tierEl.classList.contains('t1')?'t1':tierEl.classList.contains('t3')?'t3':'t2'):'t2';
  var btn=document.getElementById('favBtn');
  if(!btn)return;
  function getFavs(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
  function isFav(){return getFavs().some(function(f){return f.id===id;});}
  function sync(){btn.textContent=isFav()?'★':'☆';btn.classList.toggle('on',isFav());}
  window.toggleFav=function(){
    var favs=getFavs();var idx=-1;
    for(var i=0;i<favs.length;i++){if(favs[i].id===id){idx=i;break;}}
    if(idx!==-1)favs.splice(idx,1);
    else favs.push({id:id,title:title,tier:tier,label:title,type:'calc'});
    localStorage.setItem(KEY,JSON.stringify(favs));sync();
    try{if(window.parent!==window)window.parent.postMessage({type:'hermes-fav-toggle'},'*');}catch(e){}
  };
  sync();
})();
</script>
</body>
</html>
